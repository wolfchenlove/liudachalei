<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
html,body{height:100%;background:#f7f3ed;color:#333}
.container{max-width:768px;margin:0 auto;padding:12px;min-height:100%}
.title{text-align:center;font-size:20px;font-weight:600;margin:12px 0 16px;color:#6d4c41}
.search-box{margin-bottom:12px}
#search{width:100%;height:46px;border-radius:23px;border:1px solid #e0d6cc;padding:0 18px;font-size:16px;outline:none;background:#fff}
#search:focus{border-color:#b5936e}
.btn-group{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.tea-btn{height:44px;border-radius:12px;border:none;font-size:15px;font-weight:500;color:#fff}
.btn-green{background:#5ab95a}
.btn-red{background:#e35353}
.btn-brown{background:#a16f43}
.btn-white{background:#888}
.btn-yellow{background:#d4b843;color:#222}
.btn-dark{background:#5d4037}
.main-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);max-height:calc(100vh - 260px);overflow-y:auto}
.cate-title{font-size:18px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f0e9e2}
.base-info p{margin-bottom:4px;font-size:15px;line-height:1.3}
.label-txt{display:inline-block;;font-weight:500;color:#795548}
.tea-item{padding:6px 0;border-bottom:1px solid #f1f1f1}
.tea-item:last-child{border-bottom:none}
.tea-name{font-size:16px;font-weight:600;margin-bottom:6px;color:#5d4037}
.city-intro{margin-top:3px;font-size:14px;color:#666}
.empty-tip{text-align:center;padding:40px 0;color:#999;font-size:15px}
</style>
</head>

</div>

let currentTeaData = [];
function switchTea(typeId){
    const contentBox = document.getElementById('contentBox');
    const teaData = teaDatabase.find(item=>item.id===typeId);
    if(!teaData){contentBox.innerHTML='<div class="empty-tip">暂无数据</div>';return;}
    currentTeaData = teaData.teaList;
    let html=`<div class="cate-title">${teaData.className}</div>
    <div class="base-info">
        <p><span class="label-txt">发酵程度：</span>${teaData.ferment}</p>
        <p><span class="label-txt">核心特色：</span>${teaData.feature}</p>
        <p><span class="label-txt">主要功效：</span>${teaData.effect}</p>
        <p><span class="label-txt">适宜人群：</span>${teaData.crowd}</p>
    </div>`;
    if(teaData.teaList.length>0){
        teaData.teaList.forEach(tea=>{
            html+=`<div class="tea-item">
                <div class="tea-name">${tea.name}</div>
                <div><span class="label-txt">产地：</span>${tea.area}</div>
                <div><span class="label-txt">特色：</span>${tea.char}</div>
                <div class="city-intro"><span class="label-txt">产地：</span>${tea.cityDesc}</div>
            </div>`;
        });
    }else{html+='<div class="empty-tip">暂无名茶数据</div>';}
    contentBox.innerHTML=html;
}
function searchTea(){
    const s=document.getElementById('search').value.trim().toLowerCase();
    const c=document.getElementById('contentBox');
    if(!s && currentTeaData.length===0){c.innerHTML='<div class="empty-tip">点击茶类查看详情</div>';return;}
    if(!s && currentTeaData.length>0){
        const id=teaDatabase.find(item=>item.teaList===currentTeaData)?.id;
        if(id)switchTea(id);return;
    }
    let all=[];teaDatabase.forEach(t=>all=all.concat(t.teaList));
    const list=all.filter(x=>x.name.toLowerCase().includes(s)||x.area.toLowerCase().includes(s)||x.char.toLowerCase().includes(s)||x.cityDesc.toLowerCase().includes(s));
    let h='<div class="cate-title">搜索结果</div>';
    if(list.length>0){
        list.forEach(x=>{
            const cate=teaDatabase.find(t=>t.teaList.includes(x));
            h+=`<div class="tea-item">
                <div class="tea-name">${x.name} (${cate?.className||'未知'})</div>
                <div><span class="label-txt">产地：</span>${x.area}</div>
                <div><span class="label-txt">特色：</span>${x.char}</div>
                <div class="city-intro"><span class="label-txt">产地：</span>${x.cityDesc}</div>
            </div>`;
        });
    }else{h+='<div class="empty-tip">未找到相关茶叶</div>';}
    c.innerHTML=h;
}
</script>
